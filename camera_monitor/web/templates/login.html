<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Camera Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0f1a;
            --card-bg: #141825;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: rgba(255, 255, 255, 0.06);
            --error: #f87171;
            --error-bg: rgba(248, 113, 113, .08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, .08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, .05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(99, 102, 241, .03) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            width: 100%;
            padding: 44px 40px 36px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .02),
                0 25px 50px -12px rgba(0, 0, 0, .5),
                0 0 80px rgba(99, 102, 241, .06);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(99, 102, 241, .3);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: #fff;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.5px;
        }

        .logo-text span {
            color: var(--accent);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(.4, 0, .2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        input::placeholder {
            color: rgba(148, 163, 184, .4);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(.4, 0, .2, 1);
            margin-top: 8px;
            font-family: inherit;
            letter-spacing: -.2px;
        }

        .btn-login:hover {
            box-shadow: 0 8px 24px rgba(99, 102, 241, .35);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-box {
            background: var(--error-bg);
            border: 1px solid rgba(248, 113, 113, .2);
            color: var(--error);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .error-box svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 11px;
            color: rgba(148, 163, 184, .4);
            letter-spacing: .2px;
        }

        /* Subtle animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            animation: fadeInUp .5s cubic-bezier(.4, 0, .2, 1);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 3.8 3.8a1 1 0 0 0 .7.3H22a1 1 0 0 0 1-1v-1.5a1 1 0 0 0-.3-.7L19 13"/><path d="M2 11V5a2 2 0 0 1 2-2h6"/><path d="m7 2 1.2 1.2a1 1 0 0 1 0 1.4L7 5.8"/><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 6a6 6 0 0 1 6 6"/></svg>
                    </div>
                    <div class="logo-text">Camera<span>Monitor</span></div>
                </div>
                <p>Painel Administrativo – São Luís</p>
            </div>

            {% if error %}
            <div class="error-box">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="footer">
                &copy; 2026 Camera Monitor · São Luís - MA
            </div>
        </div>
    </div>
</body>
</html>
